name: Deploy Laravel to AWS
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production 

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, gd, zip, pdo_mysql

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Assets (Vite)
        run: npm build  

      - name: Create Deployment Package
        run: zip -r deploy.zip . -x "*.git*" "node_modules/*" "tests/*" ".env"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22 
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: "ProRec" 
          environment_name: "ProRec-env-1" 
          version_label: "deploy-${{ github.sha }}"
          region: "eu-north-1"
          deployment_package: "deploy.zip"