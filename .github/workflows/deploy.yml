name: Deploy Laravel to AWS
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, bcmath, gd, zip, pdo_mysql

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Create Deployment Package
        run: zip -r deploy.zip . -x "*.git*" "node_modules/*" "tests/*" ".env"

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v2
        with:
          aws-access-key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application-name: "ProRec"
          environment-name: "ProRec-env-1"
          version-label: "deploy-${{ github.sha }}"
          region: "eu-north-1"
          deployment-package: "deploy.zip"
