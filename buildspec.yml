version: 0.2

phases:
  install:
    runtime-versions:
      php: 8.4
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - composer install --no-dev --optimize-autoloader
  build:
    commands:
      - echo Compiling assets...
      - npm install
      - npm run build
artifacts:
  files:
    - "**/*"
